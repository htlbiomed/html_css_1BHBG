<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Memory-Spiel Biomedizin</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: rgb(250, 190, 200);
    text-align:center;
}

.memory-grid{
    display:grid;
    grid-template-columns:repeat(5, 140px);
    gap:15px;
    justify-content:center;
    margin-top:20px;
}

.card{
    width:140px;
    height:180px;
    perspective:1000px;
    cursor:pointer;
}

.card-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform 0.6s;
    transform-style:preserve-3d;
}

.card.flipped .card-inner,
.card.matched .card-inner{
    transform:rotateY(180deg);
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    border:2px solid #003366;
    border-radius:12px;
    backface-visibility:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:10px;
    box-sizing:border-box;
}

.front{
    background:white;
    transform:rotateY(180deg);
    font-weight:bold;
}

.back{
    background:white;
}

.back img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.confetti{
    position:fixed;
    font-size:25px;
    pointer-events:none;
    animation:confettiFly 1s forwards;
}

@keyframes confettiFly{
    0%{
        opacity:1;
        transform:translate(0,0);
    }
    100%{
        opacity:0;
        transform:translate(var(--x), var(--y));
    }
}

a {
    text-decoration: none;
    border: 3.5px dotted rgb(122, 24, 24);
    border-radius: 3px;
    padding: 4px;
}

a:hover {
    transition: all 1.5s linear;
    background-color: rgb(208, 12, 31);
    color: rgb(56, 29, 1);
}

h1 {
    color: rgb(36, 2, 61);
    text-align: center;
}

p {
    color: rgb(18, 5, 30);
}
</style>
</head>

<body>

<h1>Memory-Spiel</h1>

<p>
Finde die passenden Paare. Es dürfen immer nur zwei Karten gleichzeitig aufgedeckt werden.
</p>

<div id="game" class="memory-grid"></div>

<script>

const cards = [

    {pair:1, text:"Ultraschallgerät"},
    {pair:1, text:"Ultraschallgel"},

    {pair:2, text:"Röntgengerät"},
    {pair:2, text:"Röntgenstrahlen"},

    {pair:3, text:"Stethoskop"},
    {pair:3, text:"Herzschlag"},

    {pair:4, text:"Sterilisator"},
    {pair:4, text:"Sterile Instrumente"},

    {pair:5, text:"Inkubator"},
    {pair:5, text:"Frühgeborene"}

];

let firstCard = null;
let secondCard = null;
let lockBoard = false;

const game = document.getElementById("game");

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function createBoard(){

    game.innerHTML = "";

    firstCard = null;
    secondCard = null;
    lockBoard = false;

    shuffle(cards);

    cards.forEach(item=>{

        const card=document.createElement("div");
        card.classList.add("card");

        card.dataset.pair=item.pair;

        card.innerHTML=`
            <div class="card-inner">

                <div class="back">
                    <img src="logo.png" alt="HTBLuVA Salzburg">
                </div>

                <div class="front">
                    ${item.text}
                </div>

            </div>
        `;

        card.addEventListener("click", ()=>flipCard(card));

        game.appendChild(card);
    });
}

function createConfetti(card){

    const rect = card.getBoundingClientRect();

    for(let i=0;i<20;i++){

        const conf=document.createElement("div");

        conf.classList.add("confetti");
        conf.innerHTML="🎉";

        conf.style.left=(rect.left+rect.width/2)+"px";
        conf.style.top=(rect.top+rect.height/2)+"px";

        conf.style.setProperty(
            "--x",
            (Math.random()*300-150)+"px"
        );

        conf.style.setProperty(
            "--y",
            (Math.random()*300-150)+"px"
        );

        document.body.appendChild(conf);

        setTimeout(()=>{
            conf.remove();
        },1000);
    }
}

function flipCard(card){

    if(
        lockBoard ||
        card===firstCard ||
        card.classList.contains("matched")
    ){
        return;
    }

    card.classList.add("flipped");

    if(!firstCard){
        firstCard=card;
        return;
    }

    secondCard=card;
    lockBoard=true;

    checkMatch();
}

function checkMatch(){

    if(
        firstCard.dataset.pair===
        secondCard.dataset.pair
    ){

        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        createConfetti(firstCard);
        createConfetti(secondCard);

        resetTurn();

        if(
            document.querySelectorAll(".matched").length
            ===
            cards.length
        ){

            setTimeout(()=>{

                document
                .querySelectorAll(".card")
                .forEach(card=>{
                    card.classList.remove(
                        "matched",
                        "flipped"
                    );
                });

                createBoard();

            },3000);
        }

    }else{

        setTimeout(()=>{

            firstCard.classList.remove("flipped");
            secondCard.classList.remove("flipped");

            resetTurn();

        },3000);
    }
}

function resetTurn(){
    firstCard=null;
    secondCard=null;
    lockBoard=false;
}

createBoard();

</script>

<br>

<a href="Biomedizi-Gesundheitstechnik.html" target="_self">Hier gehts zurück auf die Startseite</a>

</body>
</html>
